name: Generate Snake

on:
  schedule:
    - cron: "30 16 * * *"   # 10 PM IST daily
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Samyuktha-2
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit snake files
        uses: EndBug/add-and-commit@v9
        with:
          add: 'dist'
          message: 'daily snake update'
